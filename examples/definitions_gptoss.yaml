# Configuration for annotate_difficulty program

# API configuration
base_url: http://localhost:8000/v1
api_key_env: "A"
model: "GPTOSS-20B"
report_to: "wandb"

# Input/output
input_file: "hf://datasets/marksverdhei/norwegian-wordnet-examples/sense_examples_table.tsv"
output_file: "data/definitions_GPTOSS-20B.parquet"
output_column: "definitions_GPTOSS-20B" # Name of the generated output column

# Processing options
# Prompt template (can reference any column from the dataset)
prompt_template: |-
  Skriv definisjonen av det følgende oret slik at den inneholder en forklaring av ordets eksakt betydning i akkurat, og kun den gitte setningen på Norsk bokmål.
  Fullfør ordboksdefinisjonen med kun definisjonsteksten og intet annet.  

  Ord: {wordnet_form}

  Form: {sentence_form}

  Eksempelbruk: "{example_sentence}"

  Definisjon av {wordnet_form} slik brukt i setningen over:
save_interval: 100  # Save progress every N rows (0 to only save at end)
log_interval: 1
